<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bolo Seekho - AI Mentor</title>
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #0f0f0f; display: flex; justify-content: center; align-items: center; min-height: 100vh; color: white; padding: 20px; }
        .container { background: #1a1a1a; padding: 30px; border-radius: 20px; text-align: center; width: 100%; max-width: 500px; border: 1px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .logo { width: 120px; height: 120px; border-radius: 50%; border: 3px solid #ff4d4d; margin-bottom: 15px; object-fit: cover; background: #222; }
        h2 { color: #ff4d4d; margin: 0 0 20px 0; font-size: 28px; }
        
        /* Efficiency Score Styling */
        .score-box { background: #222; border: 1px solid #444; padding: 15px; border-radius: 12px; margin-bottom: 20px; display: flex; justify-content: space-around; align-items: center; }
        .score-item { display: flex; flex-direction: column; }
        .score-label { font-size: 12px; color: #aaa; text-transform: uppercase; margin-bottom: 5px; }
        .score-val { color: #00ff00; font-weight: bold; font-size: 20px; }

        select, button { padding: 12px; margin-top: 10px; border-radius: 8px; width: 100%; font-weight: bold; border: none; cursor: pointer; transition: 0.3s; }
        select { background: #333; color: white; border: 1px solid #444; }
        #micBtn { background: #444; color: white; }
        #stopBtn { background: #dc3545; color: white; display: none; }
        #sendBtn { background: #28a745; color: white; margin-top: 20px; }
        
        #output, #reply, #vocab-mentor { margin-top: 15px; padding: 15px; background: #2a2a2a; border-radius: 10px; text-align: left; font-size: 14px; line-height: 1.5; }
        #reply { color: #00ff00; border-left: 4px solid #00ff00; }
        
        /* Vocabulary/Try English Tip */
        #vocab-mentor { color: #ffc107; border-left: 4px solid #ffc107; display: none; font-weight: 500; }
        
        .pulse { color: #ff4d4d; animation: blink 1s linear infinite; }
        @keyframes blink { 50% { opacity: 0.3; } }
    </style>
</head>
<body>

<div class="container">
    <img src="/static/logo.png" alt="Bolo Seekho Logo" class="logo" onerror="this.src='https://via.placeholder.com/120?text=BS'">
    
    <h2>Bolo Seekho</h2>

    <div class="score-box">
        <div class="score-item">
            <span class="score-label">Efficiency</span>
            <span id="eff-score" class="score-val">0%</span>
        </div>
        <div class="score-item">
            <span class="score-label">Words Used</span>
            <span id="word-count" class="score-val">0</span>
        </div>
    </div>

    <select id="lang">
        <option value="en-IN">English (Standard)</option>
        <option value="hi-IN">Hindi (हिन्दी)</option>
        <option value="bn-IN">Bengali (বাংলা)</option>
        <option value="te-IN">Telugu (తెలుగు)</option>
        <option value="mr-IN">Marathi (मराठी)</option>
        <option value="ta-IN">Tamil (தமிழ்)</option>
        <option value="gu-IN">Gujarati (ગુજરાતી)</option>
        <option value="ur-IN">Urdu (اردو)</option>
        <option value="kn-IN">Kannada (ಕನ್ನಡ)</option>
        <option value="or-IN">Odia (ଓଡ଼ିଆ)</option>
        <option value="ml-IN">Malayalam (മലയാളം)</option>
        <option value="pa-IN">Punjabi (ਪੰਜਾਬੀ)</option>
        <option value="as-IN">Assamese (অসমীয়া)</option>
    </select>

    <button id="micBtn" onclick="startListening()">🎤 Tap to Speak</button>
    <button id="stopBtn" onclick="stopListening()">⏹️ Stop Speaking</button>

    <div id="output">Your speech will appear here...</div>
    
    <div id="vocab-mentor"></div>

    <button id="sendBtn" onclick="sendToMentor()">💡 Get Mentor Answer</button>
    <div id="reply">AI response...</div>
</div>

<script>
    const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    let transcript = "";
    recognition.continuous = true;
    recognition.interimResults = true;

    function startListening() {
        recognition.lang = document.getElementById("lang").value;
        transcript = "";
        document.getElementById("micBtn").style.display = "none";
        document.getElementById("stopBtn").style.display = "block";
        document.getElementById("output").innerHTML = '<span class="pulse">🔴 Listening...</span>';
        document.getElementById("vocab-mentor").style.display = "none";
        recognition.start();
    }

    function stopListening() {
        recognition.stop();
        document.getElementById("micBtn").style.display = "block";
        document.getElementById("stopBtn").style.display = "none";
        processMetrics();
    }

    recognition.onresult = (event) => {
        let interim = "";
        for (let i = event.resultIndex; i < event.results.length; ++i) {
            if (event.results[i].isFinal) transcript += event.results[i][0].transcript;
            else interim += event.results[i][0].transcript;
        }
        document.getElementById("output").innerText = transcript || interim;
    };

    function processMetrics() {
        if (!transcript) return;
        const words = transcript.trim().split(/\s+/).length;
        document.getElementById("word-count").innerText = words;

        // Efficiency Score: Penalize for filler words (um, uh, like)
        const fillers = (transcript.match(/(um|uh|err|like|ah)/gi) || []).length;
        const score = Math.max(0, 100 - (fillers * 15));
        document.getElementById("eff-score").innerText = score + "%";

        // RESTORED: Try Speaking English logic
        const mentorDiv = document.getElementById("vocab-mentor");
        if (document.getElementById("lang").value !== "en-IN") {
            mentorDiv.style.display = "block";
            mentorDiv.innerHTML = "✨ <b>Mentor Tip:</b> Excellent effort! Try repeating this question in <u>English</u> to build your professional vocabulary.";
        } else {
            mentorDiv.style.display = "block";
            mentorDiv.innerHTML = "🚀 <b>Vocabulary Tip:</b> Instead of basic words, try using 'Essential' or 'Crucial' for better impact.";
        }
    }

    async function sendToMentor() {
    if (!transcript) return alert("Please speak a question first!");
    const r = document.getElementById("reply");
    const mentorDiv = document.getElementById("vocab-mentor"); // Make sure this ID exists in your HTML
    r.innerText = "Bolo Seekho is analyzing...";
    
    try {
        const res = await fetch("/ask_ai/", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ 
                question: transcript, 
                lang: document.getElementById("lang").value 
            })
        });
        const data = await res.json();
        r.innerText = data.answer;

        // --- MENTOR TIP LOGIC ---
        const currentLang = document.getElementById("lang").value;
        mentorDiv.style.display = "block";
        if (currentLang !== "en-IN") {
            mentorDiv.innerHTML = "✨ <b>Mentor Tip:</b> Good job! Now, try asking this in <u>English</u> to improve your vocabulary!";
        } else {
            mentorDiv.innerHTML = "🚀 <b>Vocab Boost:</b> You're doing great! Try using words like 'Advantageous' instead of 'Good'.";
        }

        // --- VOICE RESPONSE FIX ---
        window.speechSynthesis.cancel(); // Stop any previous voice
        const utterance = new SpeechSynthesisUtterance(data.answer);
        utterance.lang = currentLang;
        
        // Ensure English voice is clear
        if (currentLang === "en-IN") {
            utterance.rate = 1.0;
            utterance.pitch = 1.0;
        }
        
        window.speechSynthesis.speak(utterance);

    } catch (e) { 
        r.innerText = "Error: AI service is unavailable. Please try again later."; 
    }
}

    // Ensure voices are loaded for SpeechSynthesis
    window.speechSynthesis.onvoiceschanged = () => { window.speechSynthesis.getVoices(); };
</script>
</body>
</html>
